<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Flexbox</title>
    <style>
        .container {
            height: 544px;
            width: 100%;
            border: 2px solid black;
            
            /* Initialize a container as a flexbox */
            display: flex;


            /* Flex Properties for a flex container  */

            flex-direction: row;
            /*( default value of flex direction is row) */
            /* flex-direction: column;
            flex-direction: row-reverse;
            flex-direction: column-reverse; */
            
            flex-wrap: nowrap;/*(Default value of flex wrap is no-wrap*/
            /* flex-wrap: wrap; */
            /* flex-wrap: wrap-reverse; */

            /*This is a shorthand for flex-direction and flex-wrap */
            /* flex-flow: row-reverse wrap; */

            /* justify content will justify the content in horizontal direction */
            /* justify-content: center; */
            /* justify-content: space-between; */
            /* justify-content: space-evenly; */
            /* justify-content: space-around; */
            
            /* align-items will justify the content in vertical direction */
            /* align-items: center; */
            /* align-items: flex-end; */
            /* align-items: flex-start; */
            /* align-items: stretch; */
        }

        .item {
            width: 200px;
            height: 200px;
            background-color: tomato;
            border: 2px solid green;
            margin: 10px;
            padding: 3px;
        }

        #item-1{
            /* Flex properties for a flex item  */
            
            /* higher the order, later it shows in the container */
            /* order: 2; */

            /* flex-grow: 2;
            flex-shrink: 2; */
        }
        #item-2{
            /* flex-grow: 3;
            flex-shrink: 3;
            flex-basis: 260px; */
            /* when flex-direction is set to row, flex-basis: will control width  */
            /* when flex-direction is set to column, flex-basis: will control height  */
        }
        #item-3{
            /* flex: flex_grow flex_shrink flex_basis ; */
            /* flex: 2 2 230px ; */
            /* align-self: flex-start; */
            /* align-self: flex-end; */
            /* align-self: center; */
        }


    </style>
</head>

<body>
    <h1>This is Flexbox feature</h1>
    <div class="container">
        <div class="item" id="item-1">First box</div>
        <div class="item" id="item-2">Second box</div>
        <div class="item" id="item-3">Third box</div>
        <!-- <div class="item" id="item-4">Fourth box</div>
        <div class="item" id="item-5">Fifth box</div>
        <div class="item" id="item-6">Sixth box</div> -->
    </div>
</body>

</html>
