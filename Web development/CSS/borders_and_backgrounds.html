<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Height, Width, borders and backgrounds</title>
    <style>
        #firstPara{
            background-color: red;
            height: 100px;
            width: 455px;
            /* border-color: green;
            border-style: solid;
            border-width: 4px; */
            border: 4px solid green;
            border-radius: 11px;
        }
        
        #secondPara{
            background-color: rgb(18, 230, 81);
            height: 100px;
            width: 455px;
            
            border-top: 5px solid violet;
            border-right: 5px solid rgb(24, 176, 247);
            border-bottom: 5px solid rgb(233, 248, 14);
            border-left: 5px solid rgb(250, 173, 8);

            border-top-left-radius: 10px;
            border-top-right-radius: 200px;
            border-bottom-left-radius: 100px;
            border-bottom-right-radius: 300px;
        }

        #thirdPara{
            height: 700px;
            width: 1200px;
            background-image: url('https://circle.youthop.com/wp-content/uploads/2020/04/7-life-lessons-from-Tom-and-Jerry-cartoon.jpg');
            border: 2px solid red;
            background-repeat: no-repeat; /* repeat-x and repeat-y will make it repeat on x ans y axis */
            /* background-position: 192px 34px  ; */
            /* background-position: center center; */
            /* background-position: center left; */
            /* background-position: top center; */
        }
    </style>
</head>
<body>
    <h3>This is first Heading</h3>
    <p id="firstPara">This is first Paragraph</p>

    <h3>This is second Heading</h3>
    <p id="secondPara">This is second Paragraph</p>
    
    <h3>This is third Heading</h3>
    <p id="thirdPara">This is third Paragraph</p>
</body>
</html>
