<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            border: 2px solid black;
            background-color: khaki;
            height: 5000px;
        }
        /* CSS position: static(default), absolute, relative, fixed, sticky  */
        .box {
            display: inline-block;
            border: 2px solid red;
            width: 150px;
            height: 150px;
            margin: 2px;
        }

        #box2 {
            /* relative : relative to its normal position and will leave a gap at its normal position */
            /* position: relative; */

            /* absolute: relative to the postion of its first parent */
            /* position: absolute; */
            /* top: 34px;*/
            /*left: 34px; */

            
            /* sticky :  */
            position: sticky;
            top: 3px;
            
        }
        #box4{
            /* fixed : relative to the browser window */
            position: fixed;
            right: 4px;
            bottom: 2px;
            
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box" id="box1">1</div>
        <div class="box" id="box2">Menu</div>
        <div class="box" id="box3">3</div>
        <div class="box" id="box4">Chat with Us</div>
    </div>
</body>

</html>
