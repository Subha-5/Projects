<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Size Units</title>
    <style>
        html{
            font-size: 25px;
        }
        .container {
            /* width: 400px; */
            width: 100vw; /* width:100%; */
            /* height: 344px; */
            height: 100vh;
            font-size: 10px;
            border: 2px solid red;
        }

        h1 {
            text-align: center;
        }

        #first {
            /* font-size: 3em;
            padding: 3em; */
        }
        #second{
            /* font-size: 3rem;
            padding: 2rem; */
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 id="first">This is first Heading</h1>
        <h1 id="second">This is second Heading</h1>
        <h1 id="third">This is third Heading</h1>
    </div>
</body>

</html>


<!-- various ways to achieve Responsive Design
1. Setting up the viewport
2. Use max-width / max-height
3. Using CSS media queries
4. Using rem/vh/vw units over pixels -->
