<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS selectors</title>

    <style>
        /* element selector */
        p {
            border: 2px solid red;
        }

        /* id selector */
        #firstPara {
            color: red;
        }

        /* class selector */
        .bgBlue {
            color: yellow;
            background-color: blue;
        }

        /* group selector */
        footer,
        span {
            background-color: pink;
        }
    </style>

</head>

<body>
    <h3>CSS Selectors</h3>
    <p id="firstPara">This is a simple paragraph to demonstrate CSS selectors</p>
    <p id="secondPara" class="redElement bgBlue">This is another simple paragraph to demonstrate CSS selectors</p>
    <div>
        <p>This is yet another simple paragraph to demonstrate CSS selectors</p>
        <span>This is Span</span>
    </div>
    <footer>This is FOOTER</footer>
</body>

</html>
