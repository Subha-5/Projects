<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo selectors & more designing  
    </title>
    <style>
        .container{
            border: 2px solid red;
            background-color: rgb(224, 248, 200);
            padding: 33px;
            margin: 34px auto;
            width: 666px;
        }
        a{
            text-decoration: none;
            color: black;
        }
        a:hover{
            color: rgb(19, 1, 1);
            background-color: rgb(185, 182, 236);
        }
        a:visited{
            background-color:yellow;
        }
        a:active{
            background-color: darkblue;
        }
        .btn{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bold;
            background-color: crimson;
            padding: 6px;
            border:none;
            cursor: pointer;
            font-size: 13px;
            border-radius: 4px ;
        }
        .btn:hover{
            color: darkgoldenrod;
            background-color: rgb(223, 245, 201);
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <div class="container" id="cont1">
        <h3>This is my heading</h3>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolorem ex at adipisci, eligendi vero ipsa corporis omnis cumque nulla culpa sint praesentium perferendis, aut quos atque veritatis unde quasi maxime. Minus, quod quos. Labore?</p>
        <a href="https://simple.wikipedia.org/wiki/Lorem_ipsum#:~:text=Lorem%20ipsum%20is%20a%20dummy,font%2C%20typography%2C%20and%20layout." class="btn">Read more</a>
        <button class="btn">Contact Us</button>>
    </div>
</body>
</html>
