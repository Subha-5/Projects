<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ids and Classes</title>
</head>

<body>
    <h3>Ids and Classes in HTML</h3>
    <div id="mainBox" class="redBg blackBorder">
        this is mainbox
    </div>
    <span class="redBg"></span>
    <!-- select and press ctrl + / to comment -->
    <!-- emmet  -->
    <!-- . is used for Class and # is used for id -->
    <span class="redBg"></span> <!-- span.redBg -->
    <span id="mainSpan"></span> <!-- span#mainSpan  -->
    <div class="redBg blackBorder anotherClass"></div>    <!-- div.redBg.blackBorder.anotherClass -->
    <!-- Emmet takes div tag as default -->
    <div class="blackBackground"></div>     <!-- .blackBackground -->

    <!-- creating multiple elements using Emmmet -->
    <!-- span.myClass.myClass2.myClass3*4 + <Tab> to print 4 similar to elements using emmet-->
        <span class="myClass myClass2 myClass3">First</span>
        <span class="myClass myClass2 myClass3">Scond</span>
        <span class="myClass myClass2 myClass3">Third</span>
        <span class="myClass myClass2 myClass3">Fourth</span>

</body>

</html>
