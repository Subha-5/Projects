<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript : Date and Time</title>
</head>
<style>
    .container {
        font-size: 23px;
        background-color: blanchedalmond;
        border: 2px solid grey;
        padding: 23px;
        margin: 4px;
        text-align: center;
    }

    #time {
        font-weight: bold;
    }
</style>

<body>
    <div class="container">
        <!-- This is a container -->
        Current Time is <span id="time"></span>
    </div>
    <script>
        console.log("This is Date and Time");

        let now = new Date();
        console.log(now);

        let dt = new Date(0);
        console.log(dt);

        // let newDate = new Date("2021-12-28");

        // let newDate = new Date(year, month, date, hours, minutes, seconds, milliseconds);
        let newDate = new Date(3020, 0, 6, 9, 3, 2, 34);
        console.log(newDate);

        let yr = newDate.getFullYear()
        console.log("The year is ", yr);
        let date = newDate.getDate()
        console.log("The date is ", date);
        let month = newDate.getMonth()
        console.log("The month is ", month);
        let hour = newDate.getHours();
        console.log("The hour is ", hour);
        let minute = newDate.getMinutes();
        console.log("The minute is ", minute);
        let second = newDate.getSeconds();
        console.log("The second is ", second);
        let day = newDate.getDay();
        console.log("The day is ", day);

        newDate.setDate(8);
        newDate.setMinutes(29);
        console.log(newDate);

        Date.now();

        setInterval(updateTime, 1000);

        function updateTime() {
            time.innerHTML = new Date();
        }

    </script>
</body>

</html>
