<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript : Interaction using Alert, Confirm and Prompt</title>
</head>
<body>
    <div class="container">
        This is a page
    </div>

    <script>
        // Alert in in-browser JavaScript - does not return anything
        alert("This is a message");

        // Prompt in in-browser JavaScript
        // let name = prompt("What is your name?", "");
        let name = prompt("What is your name?", "Guest");
        console.log(name);

        // Confirm in in-browser JavaScript
        let deletePost = confirm("Do You really want to delete this post");
        console.log(deletePost)
        
        if(deletePost){
            // Code to delete post
            console.log("Your post has been deleted successfully");
        }
        else{
            // Code to cancel deletion of the post
            console.log("Your post has not been deleted");
        }
        
        // let age = prompt("What is your age ?","");
        // if(age>=18){ console.log("You can Drive !!!")}
        // else{ console.log("You cannot Drive !!!")}
    </script>
</body>
</html>
