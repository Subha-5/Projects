<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript : setTimeOut and ClearTimeOut</title>
</head>
<body>
    <div class="container">
        Time Now is <span id="time"></span>
    </div>
    <script>
        console.log("This will be printed in Developer Console");
        // setTimeOut ---> Allows us to run the function once after the interval of time 
        // clearTimeOut ---> Allows us to run the function repeatedly after the interval of time 

        function greet(name, byeText){
            console.log("Hello Good Morning !!!" + name + " " + byeText);
        }

        setTimeout(greet, 5000, "Coder", "Take Care");
        // setTimeout(greet(), 12000) ----> Wrong as it is calling the function inside setTimeOut();
        
        timeOut = setTimeout(greet, 5000, "Coder", "Take Care");
        console.log(timeOut);
        clearTimeout(timeOut);

        IntervalId = setInterval(greet,1000,"Hacker","Good Night");
        clearInterval(IntervalId);

        function displayTime(){
            time = new Date();
            console.log(time);
            document.getElementById('time').innerHTML = time ;
        }
        setInterval(displayTime, 1000);

    </script>
</body>
</html>
