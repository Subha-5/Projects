<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript : Variables, Data types and Operators</title>
    <!-- <script src="file_name.JS"> </script> -->
    <script>
        
        //dynamic typing
        var a = 78 ; //creating a variable to store integer
        var b = "Coder" //variable to store a string
        c= 34.56 ;
        console.log(a);
        console.log(b);
        console.log(c);
        
        // OPERATORS in Javascript
        // operand - entities on which operators operate 
        // in 3 + 4 : '+'is the operator and 3, 4 are the operands
        // 1. unary operator : It has single operand (x = -x)
        // Examples of unary operator
        c = -c ;
        console.log(c);
        // 2. binary operator : It has two operands (x = x+6)
        // Examples of binary operator
        c = 456 + 8 ;
        console.log(c);

        var num1 = 2 ;
        var num2 = 9 ;
        // Arithmetic Operators in action in Javascript
        console.log("The value of num1 + num2 is "+ (num1 + num2));
        console.log("The value of num1 - num2 is "+ (num1 - num2));
        console.log("The value of num1 * num2 is "+ (num1 * num2));
        console.log("The value of num1 / num2 is "+ (num1 / num2));
        console.log("The value of num1 ** num2 is "+ (num1 ** num2)); //exponent operator
        console.log("The value of num1 ++ is "+ (num1 ++ )); // Increment Operator
        console.log("The value of ++ num1 is "+ ( ++ num1)); // Increment Operator
        console.log("The value of num1 -- is "+ (num1 -- )); // Decrement Operator
        console.log("The value of -- num1 is "+ ( -- num1)); // Decrement Operator

    </script>
</head>
<body>
    <div class="container">
        <h1>This is a heading</h1>

        <div class="content">
            <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Consequuntur ex, fuga sapiente laborum provident dolore possimus tempora expedita unde blanditiis nobis cupiditate quo aut! Nulla dolores sit aspernatur eius consequuntur.</p>
        </div>
    </div>
</body>
</html>
